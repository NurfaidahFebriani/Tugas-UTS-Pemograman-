<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Laundry</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">
    <div class="status-box">
        <div class="d-flex justify-content-between align-items-center mb-4">
             <h1 class="judul-status">
                 STATUS LAUNDRY
                </h1>
                 <a href="index.html" class="btn btn-danger">
                    Logout
                 </a>

        </div>

        <table class="table table-bordered table-hover">

            <thead>

                <tr>
                    <th>No</th>
                    <th>Layanan</th>
                    <th>Berat</th>
                    <th>Status</th>
                    <th>Estimasi</th>
                    <th>Keterangan</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>Cuci Kering</td>
                    <td>3 Kg</td>
                    <td>
                        <span class="status-proses">
                            Diproses
                        </span>
                    </td>
                    <td>
                        2 Hari
                    </td>
                    <td class="notif-proses">
                        Laundry sedang diproses
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Express</td>
                    <td>2 Kg</td>
                    <td>
                        <span class="status-selesai">
                            Selesai
                        </span>
                    </td>
                    <td>
                        Hari Ini
                    </td>
                    <td class="notif-selesai">
                        Laundry sudah bisa diambil
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
