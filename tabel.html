<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h1 class="judul-laundry">
            DATA LAUNDRY
        </h1>
        <table class="table table-bordered table-hover">

            <thead>
               <tr>

                    <th>No</th>
                    <th>Nama</th>
                    <th>Layanan</th>
                    <th>Berat</th>
                    <th>Status</th>
                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>1</td>
                    <td>Budi</td>
                    <td>Cuci Kering</td>
                    <td>3 Kg</td>

                    <td>
                        <span class="status-proses">
                            Proses
                        </span>
                    </td>

                    <td>

                        <button class="btn-edit">
                            Edit
                        </button>

                        <button class="btn-hapus">
                            Hapus
                        </button>

                    </td>

                </tr>

                <tr>

                    <td>2</td>
                    <td>Siti</td>
                    <td>Express</td>
                    <td>2 Kg</td>

                    <td>
                        <span class="status-selesai">
                            Selesai
                        </span>
                    </td>

                    <td>

                        <button class="btn-edit">
                            Edit
                        </button>

                        <button class="btn-hapus">
                            Hapus
                        </button>

                    </td>

                </tr>

                <tr>

                    <td>3</td>
                    <td>Fani</td>
                    <td>Cuci Setrika</td>
                    <td>4 Kg</td>

                    <td>
                        <span class="status-proses">
                            Proses
                        </span>
                    </td>

                    <td>

                        <button class="btn-edit">
                            Edit
                        </button>

                        <button class="btn-hapus">
                            Hapus
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
