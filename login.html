<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN LOMAY LAUNDRY</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-box">

    <h2>
        LOGIN LAUNDRY
    </h2>

    <div class="pilihan-login">

        <a href="form.html" class="btn-pilih">
            LOGIN ADMIN
        </a>

        <a href="status_laundry.html" class="btn-pilih">
            LOGIN PELANGGAN
        </a>

    </div>

    <form>

        <div class="mb-3">

            <label>
                Username
            </label>

            <input
                type="text"
                class="form-control"
                placeholder="Masukkan Username"
                required>

        </div>

        <div class="mb-4">

            <label>
                Password
            </label>

            <input
                type="password"
                class="form-control"
                placeholder="Masukkan Password"
                required>

        </div>

    </form>

</div>

</body>
</html>
